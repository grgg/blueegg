# Musical key (standard notation) -> Camelot code, used by the tracklist to
# auto-derive the Camelot mixing code from a track's `key`. Keys are lowercased
# on lookup, so "C minor" / "c minor" both match. Sharp (#) and flat (b)
# spellings of the black keys both map to the same code. To add a spelling,
# drop it in here. A front-matter `camelot:` on a track overrides this.

# Minor keys — Camelot "A" ring
"c minor":  "5A"
"c# minor": "12A"
"db minor": "12A"
"d minor":  "7A"
"d# minor": "2A"
"eb minor": "2A"
"e minor":  "9A"
"f minor":  "4A"
"f# minor": "11A"
"gb minor": "11A"
"g minor":  "6A"
"g# minor": "1A"
"ab minor": "1A"
"a minor":  "8A"
"a# minor": "3A"
"bb minor": "3A"
"b minor":  "10A"

# Major keys — Camelot "B" ring
"c major":  "8B"
"c# major": "3B"
"db major": "3B"
"d major":  "10B"
"d# major": "5B"
"eb major": "5B"
"e major":  "12B"
"f major":  "7B"
"f# major": "2B"
"gb major": "2B"
"g major":  "9B"
"g# major": "4B"
"ab major": "4B"
"a major":  "11B"
"a# major": "6B"
"bb major": "6B"
"b major":  "1B"
